[pytest]
testpaths = tests/e2e
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    --html=tests/reports/report.html
    --self-contained-html
    --cov=tests
    --cov-report=html:tests/reports/coverage
    --cov-report=term-missing
    -v
    --timeout=60
markers =
    donor: Donor provider journey tests
    center: Distribution center journey tests
    consumer: Consumer (public) journey tests
    smoke: Quick smoke tests for CI gate
